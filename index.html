<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chimkens Journal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; }

  /* ── LOADING SCREEN ────────────────────────────── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0804;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    font-family: 'Space Mono', monospace;
  }
  #loading-screen.fade-out {
    animation: lsOut 0.9s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  #loader-book-wrap {
    position: relative;
    animation: bookIn 1s cubic-bezier(0.22,1,0.36,1) 0.15s both,
               bookFloat 4s ease-in-out 1.1s infinite,
               bookGlow 4s ease-in-out 1.1s infinite;
    margin-bottom: 44px;
  }
  #loader-cover {
    width: 220px; height: 290px;
    object-fit: cover;
    border-radius: 10px;
    display: block;
    box-shadow: 8px 20px 60px rgba(0,0,0,0.95), -2px 0 12px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.07);
    position: relative; z-index: 1;
  }
  .tape {
    position: absolute; background: rgba(240,228,170,0.52);
    box-shadow: 0 2px 8px rgba(0,0,0,0.45); border-radius: 2px; z-index: 2;
  }
  .tape.tape-h { top: -10px; left: 12%; right: 8%; height: 26px; transform: rotate(-2.5deg); }
  .tape.tape-v { top: 28%; right: -13px; width: 26px; height: 44%; transform: rotate(3deg); }
  .page-edge {
    position: absolute; top: 4px; right: -7px; bottom: 4px; width: 11px;
    background: repeating-linear-gradient(to bottom, #e8dfc8 0px, #cfc7b5 2px, #e8dfc8 4px);
    border-radius: 0 4px 4px 0;
    box-shadow: 2px 0 8px rgba(0,0,0,0.45);
  }

  #loader-title {
    font-size: clamp(20px,3.8vw,36px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    animation: titleIn 1.1s cubic-bezier(0.22,1,0.36,1) 0.65s both,
               glitch 9s ease-in-out 4s infinite;
  }
  #loader-sub {
    font-family: 'Instrument Serif', serif;
    font-size: 13px; color: rgba(255,255,255,0.28);
    letter-spacing: 0.36em; text-transform: uppercase;
    margin-top: 10px; text-align: center;
    animation: subIn 0.8s ease-out 1.35s both;
  }
  #loader-dots {
    display: flex; gap: 8px; margin-top: 42px;
    animation: subIn 0.6s ease-out 1.8s both;
  }
  #loader-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.55);
    display: inline-block;
  }
  #loader-dots span:nth-child(1) { animation: dot 1.2s ease-in-out 0s infinite; }
  #loader-dots span:nth-child(2) { animation: dot 1.2s ease-in-out 0.2s infinite; }
  #loader-dots span:nth-child(3) { animation: dot 1.2s ease-in-out 0.4s infinite; }

  @keyframes bookIn {
    from { opacity: 0; transform: scale(0.88) translateY(28px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bookFloat {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-13px) rotate(-1.5deg); }
  }
  @keyframes bookGlow {
    0%,100% { filter: drop-shadow(0 30px 50px rgba(0,0,0,0.8)); }
    50%      { filter: drop-shadow(0 40px 70px rgba(0,0,0,0.95)) drop-shadow(0 0 30px rgba(180,140,60,0.18)); }
  }
  @keyframes titleIn {
    from { opacity: 0; letter-spacing: 0.55em; }
    to   { opacity: 1; letter-spacing: 0.18em; }
  }
  @keyframes subIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes dot {
    0%,80%,100% { opacity: 0.15; transform: scale(0.75); }
    40%         { opacity: 1;    transform: scale(1.25); }
  }
  @keyframes glitch {
    0%,88%,100% { color: #fff; transform: none; }
    90% { color: #0ff; transform: translateX(-3px) skewX(-2deg); }
    92% { color: #f0f; transform: translateX(3px) skewX(2deg); }
    94% { color: #fff; transform: none; }
  }
  @keyframes lsOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(1.03); pointer-events: none; }
  }

  @keyframes loadFadeIn {
    from { opacity: 0; transform: scale(0.92) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes loadTitleIn {
    0% { opacity: 0; letter-spacing: 0.5em; }
    60% { opacity: 1; letter-spacing: 0.18em; }
    100% { opacity: 1; letter-spacing: 0.18em; }
  }
  @keyframes loadSubIn {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes loadBookFloat {
    0%,100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-14px) rotate(-2deg); }
  }
  @keyframes loadBookGlow {
    0%,100% { box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 60px rgba(180,120,60,0.15); }
    50% { box-shadow: 0 55px 120px rgba(0,0,0,0.9), 0 0 80px rgba(180,120,60,0.3); }
  }
  @keyframes loadSpinnerRing {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes loadFadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.04); }
  }
  @keyframes loadDotPulse {
    0%,80%,100% { opacity: 0.15; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }
  @keyframes loadSticker1 {
    0%,100% { transform: rotate(-8deg) translateY(0); }
    50% { transform: rotate(-8deg) translateY(-8px); }
  }
  @keyframes loadSticker2 {
    0%,100% { transform: rotate(5deg) translateY(0); }
    50% { transform: rotate(5deg) translateY(-10px); }
  }
  @keyframes loadGlitch {
    0%,90%,100% { clip-path: none; transform: none; color: #fff; }
    92% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translateX(-3px); color: #0ff; }
    94% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: translateX(3px); color: #f0f; }
    96% { clip-path: none; transform: none; color: #fff; }
  }
  .loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #050505;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }
  .loading-overlay.fade-out {
    animation: loadFadeOut 0.9s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  /* ── MOBILE ───────────────────────────────────── */
  @media (max-width: 640px) {
    #loading-screen { gap: 0; padding: 24px; }
    #loader-book-wrap { margin-bottom: 32px; }
    #loader-cover { width: 160px; height: 210px; }
    #loader-title { font-size: 22px !important; letter-spacing: 0.12em !important; }
    #loader-sub { font-size: 11px; margin-top: 8px; }
    #loader-dots { margin-top: 28px; }
  }
</style>
</head>
<body>
<div id="loading-screen">
  <div id="loader-book-wrap">
    <div class="tape tape-h"></div>
    <div class="tape tape-v"></div>
    <img id="loader-cover" src="cover.jpg" alt="Chimkens Journal" draggable="false" />
    <div class="page-edge"></div>
  </div>
  <div id="loader-title">CHIMKENS JOURNAL</div>
  <div id="loader-sub">✦ scrapbook ✦</div>
  <div id="loader-dots">
    <span></span><span></span><span></span>
  </div>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js">﻿</script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">﻿</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js">﻿</script>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;
﻿
const BG_DATA = "bg_original.jpg";
﻿
﻿
﻿
function Flipbook() {
  const PAGE_W = 720;
  const PAGE_H = 900;
﻿
  // Each entry = one page side. pages[0] = page 1, pages[1] = page 2, etc.
  // Book structure:
  //   Leaf 0: front = cover,       back = page 1
  //   Leaf 1: front = page 2,      back = page 3
  //   Leaf 2: front = page 4,      back = page 5
  //   ...
  //   Last leaf: front = last page, back = back cover
  //
  // Spreads (what you see when open):
  //   spread 0 = cover closed (single page)
  //   spread 1 = page 1 (left), page 2 (right)
  //   spread 2 = page 3 (left), page 4 (right)
  //   ...
  //   last spread = back cover closed (single page)
﻿
  const NUM_CONTENT_PAGES = 10; // 10 page sides (5 leaves worth)
﻿
  // Load saved data from localStorage
  const loadSaved = () => {
    try {
      const saved = localStorage.getItem("flipbook-data");
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return null;
  };
  const savedData = useRef(loadSaved());
﻿
  const [pages, setPages] = useState(
    savedData.current?.pages || Array.from({ length: NUM_CONTENT_PAGES }, () => ({ images: [] }))
  );
  const [coverPage, setCoverPage] = useState(
    savedData.current?.coverPage || { images: [] }
  );
  const [currentSpread, setCurrentSpread] = useState(0);
  const [flipping, setFlipping] = useState(false);
  const [flipProgress, setFlipProgress] = useState(0);
  const [flipDir, setFlipDir] = useState(null);
  const [dragOverPage, setDragOverPage] = useState(null);
  const [selectedImg, setSelectedImg] = useState(null);
  const [draggingImg, setDraggingImg] = useState(null);
  const [resizingImg, setResizingImg] = useState(null);
  const [rotatingImg, setRotatingImg] = useState(null);
  const [undoStack, setUndoStack] = useState([]);
  const isEditMode = new URLSearchParams(window.location.search).has("edit");
  const fileRef = useRef(null);
  const animRef = useRef(null);
  const dragStart = useRef({ x: 0, y: 0, origX: 0, origY: 0 });
  const resizeStart = useRef({ x: 0, y: 0, origW: 0, origH: 0 });
  const rotateStart = useRef({ angle: 0, origRotation: 0, centerX: 0, centerY: 0 });
﻿
  // Auto-save to localStorage when pages or cover change
  const saveTimer = useRef(null);
  useEffect(() => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try {
        localStorage.setItem("flipbook-data", JSON.stringify({ pages, coverPage }));
      } catch (e) {
        console.warn("Save failed — storage may be full", e);
      }
    }, 500); // debounce 500ms
    return () => clearTimeout(saveTimer.current);
  }, [pages, coverPage]);
﻿
  // Number of spreads: cover + ceil(contentPages/2) + back
  const numSpreads = 1 + Math.ceil(NUM_CONTENT_PAGES / 2) + 1;
  const maxSpread = numSpreads - 1;
﻿
  // Get content for a specific page number (1-indexed). 0 = cover, -1 = back cover
  const getPageContent = (pageNum) => {
    if (pageNum === 0) {
      if (!coverPage.images || coverPage.images.length === 0) return { type: "cover-blank", num: 0, contentIdx: "cover" };
      return { type: "cover-page", images: coverPage.images, num: 0, contentIdx: "cover" };
    }
    if (pageNum === -1) return { type: "back" };
    const idx = pageNum - 1; // 0-indexed into pages array
    if (idx >= 0 && idx < pages.length) {
      const p = pages[idx];
      if (!p.images || p.images.length === 0) return { type: "blank", num: pageNum, contentIdx: idx };
      return { type: "page", images: p.images, num: pageNum, contentIdx: idx };
    }
    return { type: "blank", num: pageNum, contentIdx: -1 };
  };
﻿
  // Get what's shown for a spread number
  // Returns { left, right, leftNum, rightNum }
  const getSpreadContent = (spreadIdx) => {
    if (spreadIdx <= 0) return { left: null, right: getPageContent(0), leftNum: null, rightNum: 0 }; // cover
    if (spreadIdx >= maxSpread) return { left: getPageContent(-1), right: null, leftNum: -1, rightNum: null }; // back
    const leftPageNum = (spreadIdx - 1) * 2 + 1;  // spread 1 → page 1, spread 2 → page 3
    const rightPageNum = leftPageNum + 1;           // spread 1 → page 2, spread 2 → page 4
    return {
      left: getPageContent(leftPageNum),
      right: getPageContent(rightPageNum),
      leftNum: leftPageNum,
      rightNum: rightPageNum,
    };
  };
﻿
  // Get the leaf that flips when going from one spread to the next
  // When flipping forward from spreadIdx: the right page lifts. Its front = right page, back = next left page
  // When flipping backward from spreadIdx: the left page lifts. Its front = left page, back = prev right page
  const getFlipLeaf = (fromSpread, direction) => {
    if (direction === "next") {
      const current = getSpreadContent(fromSpread);
      const dest = getSpreadContent(fromSpread + 1);
      return {
        front: current.right,  // right page of current spread (visible, turns away)
        back: dest.left,       // left page of next spread (revealed)
      };
    } else {
      const current = getSpreadContent(fromSpread);
      const dest = getSpreadContent(fromSpread - 1);
      return {
        front: current.left,   // left page of current spread (visible, turns away)
        back: dest.right,      // right page of previous spread (revealed)
      };
    }
  };
﻿
  // Drop an image onto a specific page index (0-based content index, or "cover")
  const handleDropOnPage = useCallback((contentIdx, e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragOverPage(null);
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
    if (files.length === 0) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const aspect = img.width / img.height;
        const fitW = Math.min(600, PAGE_W - 100);
        const fitH = fitW / aspect;
        const newImg = {
          src: ev.target.result,
          x: 50, y: 50,
          w: fitW, h: fitH,
          rotation: 0,
          id: Date.now() + Math.random(),
        };
        if (contentIdx === "cover") {
          setCoverPage(prev => ({ ...prev, images: [...prev.images, newImg] }));
        } else {
          setPages(prev => {
            const next = [...prev];
            const page = { ...next[contentIdx], images: [...(next[contentIdx].images || [])] };
            page.images.push(newImg);
            next[contentIdx] = page;
            return next;
          });
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(files[0]);
  }, []);
﻿
  const handleDragOver = useCallback((contentIdx, e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragOverPage(contentIdx);
  }, []);
﻿
  const handleDragLeave = useCallback((e) => {
    e.preventDefault();
    setDragOverPage(null);
  }, []);
﻿
  const flipQueueRef = useRef([]);
  const lastFlipTime = useRef(0);
﻿
  const flipTo = useCallback((direction) => {
    const now = Date.now();
    const timeSinceLast = now - lastFlipTime.current;
    lastFlipTime.current = now;
﻿
    if (flipping) {
      cancelAnimationFrame(animRef.current);
      setCurrentSpread((prev) => flipDir === "next" ? prev + 1 : prev - 1);
      setFlipping(false);
      setFlipDir(null);
      setFlipProgress(0);
    }
﻿
    const effectiveSpread = flipping 
      ? (flipDir === "next" ? currentSpread + 1 : currentSpread - 1)
      : currentSpread;
    if (direction === "next" && effectiveSpread >= maxSpread) return;
    if (direction === "prev" && effectiveSpread <= 0) return;
﻿
    const speed = timeSinceLast < 200 ? 80 
      : timeSinceLast < 400 ? 150 
      : timeSinceLast < 600 ? 250 
      : 400;
﻿
    setFlipping(true);
    setFlipDir(direction);
    setFlipProgress(0);
﻿
    let start = null;
    const duration = speed;
﻿
    const animate = (timestamp) => {
      if (!start) start = timestamp;
      const p = Math.min((timestamp - start) / duration, 1);
      const eased = p < 0.5
        ? 4 * p * p * p
        : 1 - Math.pow(-2 * p + 2, 3) / 2;
      setFlipProgress(eased);
      if (p < 1) {
        animRef.current = requestAnimationFrame(animate);
      } else {
        setCurrentSpread((prev) => direction === "next" ? prev + 1 : prev - 1);
        setFlipping(false);
        setFlipDir(null);
        setFlipProgress(0);
      }
    };
    animRef.current = requestAnimationFrame(animate);
  }, [flipping, flipDir, currentSpread, maxSpread]);
﻿
  const handleFileUpload = useCallback((e) => {
    const files = Array.from(e.target.files);
    const newPages = [];
    let loaded = 0;
    files.forEach((file, i) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        newPages[i] = { src: ev.target.result, type: "image" };
        loaded++;
        if (loaded === files.length) {
          setPages((prev) => [...prev, ...newPages.filter(Boolean)]);
        }
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  }, []);
﻿
  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === "Escape") { setSelectedImg(null); return; }
      // Undo with Ctrl+Z / Cmd+Z
      if ((e.ctrlKey || e.metaKey) && e.key === "z") {
        e.preventDefault();
        setUndoStack(prev => {
          if (prev.length === 0) return prev;
          const last = prev[prev.length - 1];
          if (last.target === "cover") {
            setCoverPage(cp => ({ ...cp, images: [...cp.images, last.image] }));
          } else {
            setPages(ps => {
              const next = [...ps];
              const page = { ...next[last.pageIdx], images: [...next[last.pageIdx].images, last.image] };
              next[last.pageIdx] = page;
              return next;
            });
          }
          return prev.slice(0, -1);
        });
        return;
      }
      if ((e.key === "Delete" || e.key === "Backspace") && selectedImg) {
        e.preventDefault();
        const { pageIdx, imgId } = selectedImg;
        if (pageIdx === "cover") {
          const deletedImg = coverPage.images.find(im => im.id === imgId);
          if (deletedImg) setUndoStack(prev => [...prev, { target: "cover", image: deletedImg }]);
          setCoverPage(prev => ({ ...prev, images: prev.images.filter(im => im.id !== imgId) }));
        } else {
          const deletedImg = pages[pageIdx]?.images.find(im => im.id === imgId);
          if (deletedImg) setUndoStack(prev => [...prev, { target: "page", pageIdx, image: deletedImg }]);
          setPages(prev => {
            const next = [...prev];
            const page = { ...next[pageIdx], images: next[pageIdx].images.filter(im => im.id !== imgId) };
            next[pageIdx] = page;
            return next;
          });
        }
        setSelectedImg(null);
        return;
      }
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); flipTo("next"); }
      if (e.key === "ArrowLeft") { e.preventDefault(); flipTo("prev"); }
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [flipTo, selectedImg, pages, coverPage]);
﻿
  // Helper to update an image in pages or coverPage
  const updateImage = useCallback((pageIdx, imgId, updater) => {
    if (pageIdx === "cover") {
      setCoverPage(prev => {
        const images = [...prev.images];
        const i = images.findIndex(im => im.id === imgId);
        if (i >= 0) images[i] = updater(images[i]);
        return { ...prev, images };
      });
    } else {
      setPages(prev => {
        const next = [...prev];
        const images = [...next[pageIdx].images];
        const i = images.findIndex(im => im.id === imgId);
        if (i >= 0) images[i] = updater(images[i]);
        next[pageIdx] = { ...next[pageIdx], images };
        return next;
      });
    }
  }, []);
﻿
  // Global mouse handlers for image drag/resize
  useEffect(() => {
    const handleMouseMove = (e) => {
      if (draggingImg) {
        const dx = e.clientX - dragStart.current.x;
        const dy = e.clientY - dragStart.current.y;
        updateImage(draggingImg.pageIdx, draggingImg.imgId, img => ({
          ...img, x: dragStart.current.origX + dx, y: dragStart.current.origY + dy
        }));
      }
      if (resizingImg) {
        const dx = e.clientX - resizeStart.current.x;
        const aspectRatio = resizeStart.current.origW / resizeStart.current.origH;
        const newW = Math.max(50, resizeStart.current.origW + dx);
        const newH = newW / aspectRatio;
        updateImage(resizingImg.pageIdx, resizingImg.imgId, img => ({
          ...img, w: newW, h: newH
        }));
      }
      if (rotatingImg) {
        const cx = rotateStart.current.centerX;
        const cy = rotateStart.current.centerY;
        const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI);
        const delta = angle - rotateStart.current.angle;
        const newRotation = rotateStart.current.origRotation + delta;
        updateImage(rotatingImg.pageIdx, rotatingImg.imgId, img => ({
          ...img, rotation: newRotation
        }));
      }
    };
    const handleMouseUp = () => {
      setDraggingImg(null);
      setResizingImg(null);
      setRotatingImg(null);
    };
    const handleTouchMove = (e) => {
      if (draggingImg || resizingImg || rotatingImg) e.preventDefault();
      if (e.touches.length === 1) handleMouseMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
    };
    const handleTouchUp = () => handleMouseUp();
    window.addEventListener("mousemove", handleMouseMove);
    window.addEventListener("mouseup", handleMouseUp);
    window.addEventListener("touchmove", handleTouchMove, { passive: false });
    window.addEventListener("touchend", handleTouchUp);
    return () => {
      window.removeEventListener("mousemove", handleMouseMove);
      window.removeEventListener("mouseup", handleMouseUp);
      window.removeEventListener("touchmove", handleTouchMove);
      window.removeEventListener("touchend", handleTouchUp);
    };
  }, [draggingImg, resizingImg, rotatingImg, updateImage]);
﻿
  const renderPage = (content, side) => {
    if (!content) return null;
﻿
    if (content.type === "blank") {
      const contentIdx = content.num - 1;
      const isDragOver = dragOverPage === contentIdx;
      return (
        <div
          onDrop={isEditMode ? (e) => handleDropOnPage(contentIdx, e) : undefined}
          onDragOver={isEditMode ? (e) => handleDragOver(contentIdx, e) : undefined}
          onDragLeave={isEditMode ? handleDragLeave : undefined}
          style={{
            width: "100%", height: "100%",
            background: isDragOver ? "rgba(200,210,205,0.9)" : "#f5f4f0",
            display: "flex", alignItems: "center", justifyContent: "center",

                  rgba(0,0,0,0.28) 0%, 
                  rgba(0,0,0,0.12) 6%, 
                  rgba(0,0,0,0.04) 15%, 
                  rgba(255,255,255,0.03) 25%,
                  transparent 40%, 
                  transparent 80%, 
                  rgba(0,0,0,0.02) 92%, 
                  rgba(0,0,0,0.05) 100%)`,
                opacity: showSpine ? 1 : 0,
                transition: "opacity 0.5s ease",
              }} />
              <div style={{
                position: "absolute", inset: 0,
                pointerEvents: "none", zIndex: 30,
                boxShadow: "inset 0 3px 12px -4px rgba(0,0,0,0.08), inset 0 -3px 12px -4px rgba(0,0,0,0.08)",
                opacity: showSpine ? 1 : 0,
                transition: "opacity 0.5s ease",
              }} />
            </div>
          )}
﻿
          {/* SPINE — zero width, curl shadows create the binding effect */}
          {showSpine && (
            <div style={{
              width: 0, flexShrink: 0,
              zIndex: 15,
            }} />
          )}
﻿
          {/* RIGHT PAGE (spread mode) — 3D curve from spine */}
          {showRight && (
            <div
              key="static-right-page"
              style={{
                width: PAGE_W, height: PAGE_H, flexShrink: 0,
                position: leavingCover ? "absolute" : "relative",
                right: leavingCover ? 0 : "auto",
                top: leavingCover ? 0 : "auto",
                overflow: "hidden",
                borderRadius: showSpine ? "0 10px 10px 0" : 10,
                background: "#f5f4f0",
                zIndex: 1,
                transform: showSpine ? "perspective(1200px) rotateY(-6deg)" : "perspective(1200px) rotateY(0deg)",
                transformOrigin: "left center",
                boxShadow: showSpine ? "0 8px 30px rgba(0,0,0,0.25)" : "6px 10px 35px rgba(0,0,0,0.5)",
                transition: "transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), box-shadow 0.5s ease, border-radius 0.3s ease",
              }}
            >
              {staticRight ? renderPage(staticRight, "right") : (
                <div style={{ width: "100%", height: "100%", background: "#f5f4f0" }} />
              )}
              {/* Curved page shadow — fades in with the curve */}
              <div style={{
                position: "absolute", inset: 0,
                pointerEvents: "none", zIndex: 30,
                background: `linear-gradient(to right, 
                  rgba(0,0,0,0.28) 0%, 
                  rgba(0,0,0,0.12) 6%, 
                  rgba(0,0,0,0.04) 15%, 
                  rgba(255,255,255,0.03) 25%,
                  transparent 40%, 
                  transparent 80%, 
                  rgba(0,0,0,0.02) 92%, 
                  rgba(0,0,0,0.05) 100%)`,
                opacity: showSpine ? 1 : 0,
                transition: "opacity 0.5s ease",
              }} />
              <div style={{
                position: "absolute", inset: 0,
                pointerEvents: "none", zIndex: 30,
                boxShadow: "inset 0 3px 12px -4px rgba(0,0,0,0.08), inset 0 -3px 12px -4px rgba(0,0,0,0.08)",
                opacity: showSpine ? 1 : 0,
                transition: "opacity 0.5s ease",
              }} />
            </div>
          )}
﻿
﻿
          {/* UNDERNEATH PAGE during leavingBack transition */}
          {leavingBack && (
            <div style={{
              position: "absolute",
              left: 0, top: 0,
              width: PAGE_W, height: PAGE_H,
              borderRadius: 10,
              overflow: "hidden",
              background: "#f5f4f0",
              zIndex: 1,
            }}>
              {staticLeft ? renderPage(staticLeft, "left") : (
                <div style={{ width: "100%", height: "100%", background: "#f5f4f0" }} />
              )}
            </div>
          )}
﻿
          {/* === 3D FLIPPING PAGE — NEXT === */}
          {flipping && flipDir === "next" && (
            <div style={{
              position: "absolute",
              left: leavingCover ? 0 : arrivingBack ? PAGE_W : visibleWidth - PAGE_W,
              top: 0, width: PAGE_W, height: PAGE_H,
              transformOrigin: "left center",
              transform: `rotateY(${flipAngle}deg)`,
              transformStyle: "preserve-3d",
              zIndex: 20, pointerEvents: "none",
            }}>
              {/* Front: the right page being turned away */}
              <div style={{
                position: "absolute", inset: 0,
                backfaceVisibility: "hidden",
                borderRadius: "0 10px 10px 0",
                overflow: "hidden",
                background: "#f5f4f0",
                boxShadow: `${-6 * shadowIntensity}px 0 ${15 + 20 * shadowIntensity}px rgba(0,0,0,${0.1 + 0.3 * shadowIntensity})`,
              }}>
                {renderPage(flipFront, "right")}
                {/* Curl shadow — spine is on left edge of this page */}
                <div style={{
                  position: "absolute", left: 0, top: 0, bottom: 0, width: 440,
                  background: "linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 10%, rgba(0,0,0,0.06) 30%, transparent 100%)",
                  pointerEvents: "none", zIndex: 30,
                }} />
                <div style={{
                  position: "absolute", left: 0, top: 0, bottom: 0, width: 120,
                  background: "linear-gradient(to right, rgba(0,0,0,0.25) 0%, transparent 100%)",
                  pointerEvents: "none", zIndex: 30,
                }} />
                <div style={{
                  position: "absolute", inset: 0,
                  background: `rgba(0,0,0,${Math.max(0, (flipProgress - 0.45) * 0.5)})`,
                  pointerEvents: "none", zIndex: 31,
                }} />
              </div>
              {/* Back: revealed as new left page */}
              <div style={{
                position: "absolute", inset: 0,
                backfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
                borderRadius: "10px 0 0 10px",
                overflow: "hidden",
                background: "#f5f4f0",
                boxShadow: `${6 * shadowIntensity}px 0 ${15 + 20 * shadowIntensity}px rgba(0,0,0,${0.1 + 0.3 * shadowIntensity})`,
              }}>
                {renderPage(flipBack, "left")}
                <div style={{
                  position: "absolute", inset: 0,
                  background: `rgba(0,0,0,${Math.max(0, (1 - flipProgress - 0.45) * 0.45)})`,
                  pointerEvents: "none", zIndex: 31,
                }} />
              </div>
            </div>
          )}
﻿
          {/* === 3D FLIPPING PAGE — PREV === */}
          {flipping && flipDir === "prev" && (
            <div style={{
              position: "absolute",
              left: arrivingCover ? -PAGE_W : 0, top: 0,
              width: PAGE_W, height: PAGE_H,
              transformOrigin: "right center",
              transform: `rotateY(${flipAngle}deg)`,
              transformStyle: "preserve-3d",
              zIndex: 20, pointerEvents: "none",
            }}>
              {/* Front: left page being turned back */}
              <div style={{
                position: "absolute", inset: 0,
                backfaceVisibility: "hidden",
                borderRadius: "10px 0 0 10px",
                overflow: "hidden",
                background: "#f5f4f0",
                boxShadow: `${6 * shadowIntensity}px 0 ${15 + 20 * shadowIntensity}px rgba(0,0,0,${0.1 + 0.3 * shadowIntensity})`,
              }}>
                {renderPage(flipFront, "left")}
                {/* Curl shadow — spine is on right edge of this page */}
                <div style={{
                  position: "absolute", right: 0, top: 0, bottom: 0, width: 440,
                  background: "linear-gradient(to left, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 10%, rgba(0,0,0,0.06) 30%, transparent 100%)",
                  pointerEvents: "none", zIndex: 30,
                }} />
                <div style={{
                  position: "absolute", right: 0, top: 0, bottom: 0, width: 120,
                  background: "linear-gradient(to left, rgba(0,0,0,0.25) 0%, transparent 100%)",
                  pointerEvents: "none", zIndex: 30,
                }} />
                <div style={{
                  position: "absolute", inset: 0,
                  background: `rgba(0,0,0,${Math.max(0, (flipProgress - 0.45) * 0.5)})`,
                  pointerEvents: "none", zIndex: 31,
                }} />
              </div>
              {/* Back: revealed as new right page */}
              <div style={{
                position: "absolute", inset: 0,
                backfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
                borderRadius: "0 10px 10px 0",
                overflow: "hidden",
                background: "#f5f4f0",
                boxShadow: `${-6 * shadowIntensity}px 0 ${15 + 20 * shadowIntensity}px rgba(0,0,0,${0.1 + 0.3 * shadowIntensity})`,
              }}>
                {renderPage(flipBack, "right")}
                <div style={{
                  position: "absolute", inset: 0,
                  background: `rgba(0,0,0,${Math.max(0, (1 - flipProgress - 0.45) * 0.45)})`,
                  pointerEvents: "none", zIndex: 31,
                }} />
              </div>
            </div>
          )}
﻿
          {/* Ambient light — shifts with tilt like an overhead lamp reflecting off the surface */}
          <div style={{
            position: "absolute", inset: 0,
            borderRadius: 10,
            background: `radial-gradient(ellipse at ${50 + tilt.y * 15}% ${50 + tilt.x * 15}%, rgba(255,255,245,0.12) 0%, rgba(255,255,245,0.04) 35%, transparent 70%)`,
            pointerEvents: "none",
            zIndex: 25,
            transition: flipping ? "none" : "background 0.15s ease-out",
            mixBlendMode: "soft-light",
          }} />
          {/* Subtle edge darkening opposite the light */}
          <div style={{
            position: "absolute", inset: 0,
            borderRadius: 10,
            background: `radial-gradient(ellipse at ${50 - tilt.y * 20}% ${50 - tilt.x * 20}%, transparent 40%, rgba(0,0,0,0.06) 100%)`,
            pointerEvents: "none",
            zIndex: 25,
            transition: flipping ? "none" : "background 0.15s ease-out",
          }} />
﻿
          {/* Page thickness edge */}
          {(isOnCover && !flipping) && (
            <div style={{
              position: "absolute", right: -4, top: 8, bottom: 8, width: 5,
              background: "linear-gradient(to right, #eae8e2, #dddbd5)",
              borderRadius: "0 2px 2px 0",
              boxShadow: "1px 0 4px rgba(0,0,0,0.15)", zIndex: 1,
            }} />
          )}
          {(isOnBack && !flipping) && (
            <div style={{
              position: "absolute", left: -4, top: 8, bottom: 8, width: 5,
              background: "linear-gradient(to left, #eae8e2, #dddbd5)",
              borderRadius: "2px 0 0 2px",
              boxShadow: "-1px 0 4px rgba(0,0,0,0.15)", zIndex: 1,
            }} />
          )}
        </div>
      </div>
﻿
      {/* Controls */}
      <div style={{
        marginTop: isMobile ? 20 : 48,
        display: "flex", alignItems: "center",
        gap: isMobile ? 12 : 18,
        fontFamily: "'Space Mono', monospace",
        zIndex: 10, position: "relative",
        width: isMobile ? "100%" : "auto",
        justifyContent: "center",
        paddingBottom: isMobile ? 8 : 0,
      }}>
        <button onClick={() => flipTo("prev")} disabled={currentSpread <= 0 || flipping}
          style={{
            background: currentSpread <= 0 ? "rgba(0,0,0,0.04)" : "rgba(20,14,8,0.85)", backdropFilter: "blur(8px)",
            border: "1.5px solid rgba(40,28,14,0.18)",
            color: currentSpread <= 0 ? "rgba(80,60,40,0.2)" : "rgba(245,235,220,0.95)",
            padding: isMobile ? "14px 28px" : "10px 22px", borderRadius: 8,
            cursor: currentSpread <= 0 ? "default" : "pointer",
            fontSize: isMobile ? 20 : 15, letterSpacing: 2,
            boxShadow: currentSpread <= 0 ? "none" : "0 2px 12px rgba(0,0,0,0.25)",
            transition: "all 0.15s ease", minWidth: isMobile ? 60 : "auto",
          }}>{"←"}</button>
﻿
        {isEditMode && <button onClick={() => fileRef.current.click()}
          style={{
            background: "rgba(20,14,8,0.82)", backdropFilter: "blur(8px)",
            border: "1.5px solid rgba(40,28,14,0.2)",
            color: "rgba(245,235,220,0.85)",
            padding: isMobile ? "14px 16px" : "10px 22px", borderRadius: 8, cursor: "pointer",
            fontSize: isMobile ? 10 : 11, letterSpacing: 2,
            boxShadow: "0 2px 12px rgba(0,0,0,0.22)", transition: "all 0.15s ease",
          }}>{isMobile ? "+ IMG" : "+ ADD PAGES"}</button>}
﻿
        <span style={{
          fontSize: isMobile ? 10 : 11, color: "rgba(40,28,14,0.55)", letterSpacing: 3,
          minWidth: isMobile ? 50 : 70, textAlign: "center",
        }}>
          {currentSpread === 0 && !flipping ? "COVER" : currentSpread >= maxSpread && !flipping ? "END" : `${currentSpread} / ${maxSpread}`}
        </span>
﻿
        <button onClick={() => flipTo("next")} disabled={currentSpread >= maxSpread || flipping}
          style={{
            background: currentSpread >= maxSpread ? "rgba(0,0,0,0.04)" : "rgba(20,14,8,0.85)", backdropFilter: "blur(8px)",
            border: "1.5px solid rgba(40,28,14,0.18)",
            color: currentSpread >= maxSpread ? "rgba(80,60,40,0.2)" : "rgba(245,235,220,0.95)",
            padding: isMobile ? "14px 28px" : "10px 22px", borderRadius: 8,
            cursor: currentSpread >= maxSpread ? "default" : "pointer",
            fontSize: isMobile ? 20 : 15, letterSpacing: 2,
            boxShadow: currentSpread >= maxSpread ? "none" : "0 2px 12px rgba(0,0,0,0.25)",
            transition: "all 0.15s ease", minWidth: isMobile ? 60 : "auto",
          }}>{"→"}</button>
      </div>
﻿
      {isEditMode && <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: "none" }}
        onChange={handleFileUpload} />}
﻿

      {!isMobile && isEditMode && <div style={{
        position: "fixed", bottom: 16,
        fontSize: 9, color: "rgba(40,28,14,0.35)",
        fontFamily: "'Space Mono', monospace", letterSpacing: 2,
        zIndex: 10, textAlign: "center",
      }}>drop images on pages &middot; click to select &middot; drag to move &middot; corner to resize &middot; delete to remove &middot; ctrl+z to undo</div>}
      {isMobile && isEditMode && <div style={{ position: "fixed", bottom: 10, fontSize: 9, color: "rgba(40,28,14,0.3)", fontFamily: "'Space Mono', monospace", letterSpacing: 1, zIndex: 10, textAlign: "center" }}>swipe to flip &middot; tap to select</div>}
    </div>
  );
}
﻿
﻿
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Flipbook));

// Dismiss loading screen
(function() {
  const screen = document.getElementById('loading-screen');
  if (!screen) return;
  setTimeout(function() {
    screen.classList.add('fade-out');
    setTimeout(function() { screen.style.display = 'none'; }, 900);
  }, 2800);
})();
</script>
</body>
</html>
